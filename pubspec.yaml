name: neomeo
description: "너머 — 외출 전, 조용히 안심을 더해주는 인지 보조 도구"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Routing + deeplink
  go_router: ^14.2.7

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  # Geofencing (background, Android 5.1+, successor of geofence_service)
  geofencing_api: ^2.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Storage
  shared_preferences: ^2.3.2

  # Background task (midnight reset)
  workmanager: ^0.9.0+3

  # Utils
  intl: ^0.19.0
  http: ^1.6.0
  google_sign_in: ^6.2.0
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
